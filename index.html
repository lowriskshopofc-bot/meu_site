<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguarde para acessar o conteúdo</title>
    <script src="https://3nbf4.com/pfe/current/tag.min.js?z=10634674" data-cfasync="false" async></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a1a; color: white; padding-top: 100px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; background: #2d2d2d; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #btn-pular { 
            padding: 20px 40px; font-size: 20px; background-color: #00c853; color: white; 
            border: none; border-radius: 50px; cursor: pointer; display: none; 
            margin: 20px auto; font-weight: bold; transition: 0.3s;
        }
        #btn-pular:hover { background-color: #00e676; transform: scale(1.05); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00c853; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>Processando seu acesso...</h2>
        <div id="status">
            <div class="loader"></div>
            <p>Aguarde <span id="tempo">5</span> segundos</p>
        </div>
        
        <button id="btn-pular" onclick="gerarRendaERedirecionar()">LIBERAR ACESSO AGORA</button>
    </div>

    <script>
        let tempoRestante = 5;
        const linkDestino = "https://capibaraia.com/";
        // COLOQUE SEU "DIRECT LINK" DA MONETAG AQUI ABAIXO (Se tiver um)
        const linkAnuncio = "https://3nbf4.com/act/files/service-worker.min.js?r=sw"; 

        const intervalo = setInterval(() => {
            tempoRestante--;
            document.getElementById('tempo').textContent = tempoRestante;
            if (tempoRestante <= 0) {
                clearInterval(intervalo);
                document.getElementById('status').style.display = 'none';
                document.getElementById('btn-pular').style.display = 'block';
            }
        }, 1000);

        function gerarRendaERedirecionar() {
            // Abre o anúncio em uma nova aba
            window.open(linkAnuncio, '_blank');
            // Redireciona a página atual para o site oficial
            window.location.href = linkDestino;
        }
    </script>
</body>
      </html>
